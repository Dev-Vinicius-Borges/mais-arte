name: CI

on:
  pull_request:
    branches: [ "main", "development" ]
  push:
    branches: [ "main", "development" ]

jobs:
  validate-repo-structure:
    name: Validação da Estrutura do Repositório
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          required_files=(
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "CODEOWNERS"
            "markdownlint-cli2.jsonc"
            ".markdownlintignore"
            ".github/ISSUE_TEMPLATE/bug_report.md"
            ".github/ISSUE_TEMPLATE/config.yml"
            ".github/ISSUE_TEMPLATE/feature_request.md"
            ".github/ISSUE_TEMPLATE/rfc_mudanca_escopo.md"
            ".github/ISSUE_TEMPLATE/task_tecnica.md"
            ".github/pull_request_template.md"
            "docs/processo/acordo-de-branches-protegidas.md"
            "docs/processo/acordo-de-niveis-de-prioridade.md"
            "docs/processo/definition-of-done.md"
            "docs/processo/definition-of-ready.md"
            "docs/processo/fluxo-de-code-review.md"
            "docs/processo/padrao-de-branches.md"
            "docs/processo/padrao-de-commits.md"
            "docs/processo/padrao-de-issue.md"
            "docs/processo/padrao-de-pull-requests.md"
            "docs/processo/padrao-documentacao.md"
            "docs/processo/politica-de-uso-de-ia.md"
            "docs/processo/rfc-template.md"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Arquivo base necessario esta faltando: $file"
              missing=1
            else
              echo "Encontrou o arquivo: $file"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Falha na validação da arquitetura de arquivos."
            exit 1
          fi

      - name: Check required directories
        run: |
          required_dirs=(
            "docs"
            "docs/processo"
            "diagrams"
            "database"
            "backend"
            "frontend"
          )

          missing=0
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "Diretório essencial faltando: $dir"
              missing=1
            else
              echo "Encontrou o diretorio: $dir"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Falha na validação da arquitetura de pastas."
            exit 1
          fi

      - name: Basic shell safety check
        run: |
          echo "Checagem básica concluida."